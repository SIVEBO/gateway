server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: ms-sucursales
          uri: lb://MS_SUCURSALES
          predicates:
            - Path=/api/v1/sucursales/**, /api/v1/comunas/**, /api/v1/regiones/**

        - id: ms-embalaje
          uri: lb://MS_EMBALAJE
          predicates:
            - Path=/api/articulos/**, /api/categorias/**, /api/stock/**

        - id: ms-finanzas
          uri: lb://MS_FINANZAS
          predicates:
            - Path=/api/cajas/**, /api/aperturas/**, /api/movimientos/**

        - id: ms-paquetes
          uri: lb://MS_PAQUETES
          predicates:
            - Path=/api/inventario/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
